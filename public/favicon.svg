<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#0a0a0f"/>
  
  <!-- JG monogram built from sharp angular straight lines -->
  <!-- The letters share a vertical center spine and use diagonals -->
  
  <!-- J: top bar, drops down, hooks left with an angle -->
  <polyline points="8,12 28,12 28,44 18,44 18,36" 
    fill="none" stroke="#e8e8e8" stroke-width="3.5" stroke-linejoin="miter" stroke-linecap="square"/>
  
  <!-- G: top bar, drops down left side, across bottom, up right side, crossbar inward -->
  <polyline points="56,12 34,12 34,52 56,52 56,32 46,32" 
    fill="none" stroke="#e8e8e8" stroke-width="3.5" stroke-linejoin="miter" stroke-linecap="square"/>
</svg>
